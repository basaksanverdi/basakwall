<!DOCTYPE html>
<html>

<head>
    <title>{{ user.username }} Profile</title>
</head>

<body>

    {% if current_user == user.username %}

        <a href="/logout">
            Logout
        </a>

    {% else %}

        {% if is_following %}

            <a href="/unfollow/{{ user.username }}">
                Unfollow
            </a>

        {% else %}

            <a href="/follow/{{ user.username }}">
                Follow
            </a>

        {% endif %}

    {% endif %}

    <h1>@{{ user.username }}</h1>

    <img
        src="{{ url_for(
            'static',
            filename='profile_pictures/' + user.profile_picture
        ) }}"
        width="150"
    >

    <p>
        Followers: {{ follower_count }}
    </p>

    <p>
        Following: {{ following_count }}
    </p>

    <p>
        Joined:
        {{ user.created_at }}
    </p>

</body>

</html>
